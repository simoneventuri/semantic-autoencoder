# project_config.example.yaml
#
# This is the committed template. Copy to project_config.yaml (gitignored) and fill in.
# project_config.yaml is generated by /setup — edit it directly for minor tweaks.
#
# DO NOT add fields beyond the ones shown here.

project:
  name: ***                   # e.g. "legacy-solver-system"

source:
  root: encoded/legacy/***    # path to the legacy codebase within encoded/legacy/

ir_root: semantic_ir           # do not change; canonical IR lives here

permissions:
  filesystem_boundary: project-local   # project-local | extended (list external_paths)
  external_paths: []                   # populated only if user grants external access
  encoded_immutable: true              # always true; here for explicit audit trail

profile:
  familiarity: B              # A = first-time user (more explanations); B = returning user

autonomy:
  mode: semi-guided           # autonomous | semi-guided | interactive

encoders:
  max_parallel: 3             # 1 | 2 | 3 — orchestrator picks per chunk, capped by this

references:
  supplementary: none         # none | "path or description of supplementary material"
  confidence: n/a             # primary | secondary | skeptical

models:
  orchestrator: claude-opus-4-8     # manages parts, chunks, and agent invocations
  agents: claude-sonnet-4-6         # encoder, critic, merger, decoder, tester agents

notation:
  style_file: semantic_ir/canonical/10_semantic_requirements/notation_style.md

session_started: YYYY-MM-DD

# ---------------------------------------------------------------------------
# Notation Style Template
# ---------------------------------------------------------------------------
# When /setup completes Step 0.7, it creates the file referenced above from
# this template. Fill in the chosen options.
#
# ---
# # Notation Style — [Project Name]
# # Chosen during session start interview on [DATE]. Binding for all IR files.
#
# ## Variables and Scalar Parameters
# Style: [LaTeX subscript | lowercase_underscore | PascalCase]
# Examples: $r_\text{max}$, $n_\text{call}$
#
# ## Vectors and Matrices
# Style: [bold LaTeX | prose + symbol]
# Examples: $\mathbf{p}$, $\mathbf{T}_{pq}$
#
# ## Procedures, Classes, and Modules
# Style: [A = semantic prose only | B = first-use italic | C = backtick]
#
# ## Acronyms
# Style: [ALL CAPS | Mixed]
# Examples: ODE, FFT, RHS
#
# ## LaTeX Rule (always enforced)
# All mathematical expressions in $...$ (inline) or $$...$$ (display).
# ---------------------------------------------------------------------------
