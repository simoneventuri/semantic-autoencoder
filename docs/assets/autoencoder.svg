<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 260" width="840" height="260" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" role="img" aria-label="Legacy source code is encoded into the Semantic Intermediate Representation latent, which the decoder expands into several derived artifacts: a new implementation, documentation, tests, and more.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E8633A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="260" fill="#F7F5F0"/>

  <!-- legacy source code (data: parallelogram) -->
  <polygon points="36,55 160,55 144,205 20,205" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="90" y="134" text-anchor="middle" font-size="11.5" fill="#333333">legacy source code</text>

  <line x1="152" y1="130" x2="190" y2="130" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- encode: converging trapezoid (transform) -->
  <polygon points="198,55 308,95 308,165 198,205" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="248" y="118" text-anchor="middle" font-size="10" fill="#333333">team of</text>
  <text x="248" y="132" text-anchor="middle" font-size="10" fill="#333333">encoding</text>
  <text x="248" y="146" text-anchor="middle" font-size="10" fill="#333333">agents</text>

  <line x1="308" y1="130" x2="350" y2="130" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Semantic Intermediate Representation: the latent / bottleneck (data: parallelogram) -->
  <polygon points="366,95 470,95 456,165 352,165" fill="#E8633A" stroke="#E8633A" stroke-width="1.5"/>
  <text x="411" y="117" text-anchor="middle" font-size="10.5" fill="#ffffff">Semantic</text>
  <text x="411" y="132" text-anchor="middle" font-size="10.5" fill="#ffffff">Intermediate</text>
  <text x="411" y="147" text-anchor="middle" font-size="10.5" fill="#ffffff">Representation</text>

  <line x1="463" y1="130" x2="500" y2="130" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- decode: diverging trapezoid (transform) -->
  <polygon points="506,95 616,45 616,215 506,165" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="561" y="118" text-anchor="middle" font-size="10" fill="#333333">team of</text>
  <text x="561" y="132" text-anchor="middle" font-size="10" fill="#333333">decoding</text>
  <text x="561" y="146" text-anchor="middle" font-size="10" fill="#333333">agents</text>

  <!-- fan-out arrows from the decoder -->
  <line x1="618" y1="130" x2="671" y2="55"  stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="618" y1="130" x2="671" y2="105" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="618" y1="130" x2="671" y2="155" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="618" y1="130" x2="671" y2="205" stroke="#E8633A" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- derived artifacts (data: parallelograms) -->
  <polygon points="678,37 818,37 806,73 666,73" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="742" y="59" text-anchor="middle" font-size="11.5" fill="#333333">new implementation</text>

  <polygon points="678,87 818,87 806,123 666,123" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="742" y="109" text-anchor="middle" font-size="11.5" fill="#333333">documentation</text>

  <polygon points="678,137 818,137 806,173 666,173" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <text x="742" y="159" text-anchor="middle" font-size="11.5" fill="#333333">tests</text>

  <polygon points="678,187 818,187 806,223 666,223" fill="#ffffff" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="742" y="211" text-anchor="middle" font-size="13" fill="#777777">…</text>
</svg>
